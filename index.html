<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>switchto.claude — Fix Claude in 60 seconds</title>
<meta name="description" content="Claude doesn’t know you. Fix that in 60 seconds. Migrate your ChatGPT memory instantly.">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Mono',monospace;background:#faf9f6;color:#1a1a18;margin:0}
.container{max-width:720px;margin:0 auto;padding:40px}
h1{font-family:'Fraunces',serif;font-size:48px;line-height:1.1}
em{color:#d4521a}
.upload{border:2px dashed #ddd;padding:40px;text-align:center;border-radius:12px;cursor:pointer}
button{padding:12px 20px;border:none;border-radius:8px;background:#d4521a;color:#fff;cursor:pointer}
.section{margin-top:30px}
.card{border:1px solid #eee;border-radius:10px;padding:20px;background:#fff;margin-bottom:12px}
pre{white-space:pre-wrap;font-size:12px}
input{padding:10px;border:1px solid #ccc;border-radius:6px}
</style>
</head>
<body>
<div class="container">
<h1>Claude doesn’t know you.<br><em>Fix that in 60 seconds.</em></h1>
<p>Upload your ChatGPT export → rebuild your memory → paste into Claude.</p>

<div class="upload" onclick="fileInput.click()">Drop conversations.json or click</div>
<input type="file" id="fileInput" style="display:none">

<div id="output" class="section"></div>

<div class="section" id="waitlist" style="display:none">
<h3>Next: migrate to other AIs</h3>
<input id="email" placeholder="Enter email">
<button onclick="join()">Join</button>
</div>
</div>

<script>
let dataStore={topics:[],prefs:[],memory:[]};

document.getElementById('fileInput').addEventListener('change', async e=>{
 const file=e.target.files[0];
 const text=await file.text();
 const data=JSON.parse(text);
 process(data);
});

function process(data){
 let texts=[];
 data.forEach(c=>{
  if(c.mapping){
    Object.values(c.mapping).forEach(n=>{
      if(n.message && n.message.content?.parts){
        texts.push(n.message.content.parts.join(' '));
      }
    })
  }
 });
 dataStore.topics=extractTopics(data);
 dataStore.prefs=texts.slice(0,10);
 dataStore.memory=texts.slice(0,10);
 render();
}

function extractTopics(data){
 const map={};
 data.forEach(c=>{
  const t=c.title||'';
  t.split(' ').forEach(w=>{
    if(w.length>4){map[w]=(map[w]||0)+1}
  })
 });
 return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>x[0]);
}

function identity(){
 return `AI PROFILE:\n- Focus: ${dataStore.topics.join(', ')}\n- Style: direct, no fluff\n- Type: builder`;
}

function prompt(){
 return `Remember this about me:\n- Focus: ${dataStore.topics.join(', ')}\n- Preferences: direct answers\nConfirm memory.`;
}

function render(){
 const out=document.getElementById('output');
 out.innerHTML=`
 <div class="card"><h3>🧬 Your AI Identity</h3><pre>${identity()}</pre></div>
 <div class="card"><h3>Claude Prompt</h3><pre>${prompt()}</pre></div>
 <button onclick="copy()">Copy Prompt</button>
 <button onclick="openClaude()">Open Claude</button>
 `;
 document.getElementById('waitlist').style.display='block';
}

function copy(){
 navigator.clipboard.writeText(prompt());
 alert('Copied');
}

function openClaude(){
 navigator.clipboard.writeText(prompt());
 window.open('https://claude.ai','_blank');
}

function join(){
 const email=document.getElementById('email').value;
 console.log(email);
 alert('You are in');
}
</script>
</body>
</html>
